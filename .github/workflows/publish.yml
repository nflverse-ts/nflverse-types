name: Publish to npm

# Changesets flow: pushes to main with pending changesets open/refresh a
# "Version Packages" PR; merging that PR publishes to npm via OIDC trusted
# publishing (configured on npmjs.com for this repo + workflow file).
# With no pending changesets, the publish step still publishes any version
# not yet on the registry (this is how 0.1.0 ships).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; no NPM_TOKEN needed.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm run validate

      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
